global:
  scrape_interval: 15s

scrape_configs:

    - job_name: 'ml-metrics-exporter'
      static_configs:
      - targets: ['ml-metrics-exporter.monitoring:8000']
      metrics_path: '/metrics'
      scrape_interval: 15s
  - job_name: 'netflix-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['netflix-api-service.netflix-ml.svc.cluster.local:80']

