apiVersion: v1
kind: PersistentVolume
metadata:
  name: mlflow-artifacts-pv
  namespace: argo
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/data/mlflow-artifacts

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifacts-pvc
  namespace: argo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: argo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-server
  template:
    metadata:
      labels:
        app: mlflow-server
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/philipmay/mlflow-image:latest
          ports:
            - containerPort: 5000
          args:
            [
              "mlflow",
              "server",
              "--host", "0.0.0.0",
              "--port", "5000",
              "--backend-store-uri", "postgresql://postgres:postgres@postgres:5432/mlflow_db",
              "--default-artifact-root", "/mlflow/artifacts",
              "--workers", "1"
            ]
          volumeMounts:
            - name: artifacts-volume
              mountPath: /mlflow/artifacts
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 5
      volumes:
        - name: artifacts-volume
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
