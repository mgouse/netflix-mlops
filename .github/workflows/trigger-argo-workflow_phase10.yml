name: Trigger Netflix Argo Workflow (Manual)

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        description: 'Workflow file name (without .yml)'
        required: true
        default: 'netflix-ml-pipeline-fixed_phase10'

jobs:
  trigger-argo-workflow:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Verify kubectl access
      run: |
        kubectl config use-context minikube
        kubectl get nodes
        echo "Current workflows:"
        kubectl get workflows -n argo || echo "No workflows yet"
        
    - name: Submit Argo Workflow
      run: |
        WORKFLOW_NAME="${{ github.event.inputs.workflow_name }}"
        WORKFLOW_FILE=".github/workflows/${WORKFLOW_NAME}.yml"
        
        echo "Submitting: $WORKFLOW_FILE"
        
        if [ ! -f "$WORKFLOW_FILE" ]; then
          echo "ERROR: File not found: $WORKFLOW_FILE"
          exit 1
        fi
        
        kubectl create -f "$WORKFLOW_FILE" -n argo
        
        sleep 3
        WORKFLOW_ID=$(kubectl get workflows -n argo --sort-by='.metadata.creationTimestamp' -o jsonpath='{.items[-1].metadata.name}')
        
        echo "✅ Submitted: $WORKFLOW_ID"
        echo "WORKFLOW_ID=$WORKFLOW_ID" >> $GITHUB_ENV
        
    - name: Monitor Workflow Status
      run: |
        WORKFLOW_ID="${{ env.WORKFLOW_ID }}"
        echo "Monitoring: $WORKFLOW_ID"
        
        timeout=1800
        start_time=$(date +%s)
        
        while true; do
          elapsed=$(($(date +%s) - start_time))
          
          if [ $elapsed -gt $timeout ]; then
            echo "Timeout!"
            exit 1
          fi
          
          STATUS=$(kubectl get workflow "$WORKFLOW_ID" -n argo -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
          echo "Status: $STATUS (${elapsed}s)"
          
          [ "$STATUS" = "Succeeded" ] && break
          [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Error" ] && exit 1
          
          sleep 15
        done
        
        echo "✅ Workflow completed successfully!"

    - name: Display Results
      run: |
        echo "========================================"
        echo "🎉 Netflix ML Pipeline Complete!"
        echo "========================================"
        echo "Workflow: ${{ env.WORKFLOW_ID }}"
        echo ""
        echo "📊 Access Points:"
        echo "Argo UI:  kubectl port-forward -n argo svc/argo-server 2746:2746"
        echo "          http://localhost:2746"
        echo ""
        echo "MLflow:   kubectl port-forward -n argo svc/mlflow-service 5000:5000"
        echo "          http://localhost:5000"
        echo "========================================"