name: Main CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/netflix-api

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: |
        pip install flake8 black
        black --check src/ tests/ || true
        flake8 src/ tests/ --max-line-length=88 || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: |
        pip install -r requirements.txt
        pytest tests/

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ github.sha }}

  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: pip install pyyaml
    - run: python scripts/ci/validate_k8s_manifests.py

  trigger-argo:
    name: Trigger Argo on Minikube
    runs-on: self-hosted
    needs: [build-and-push, validate-k8s]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup kubectl context
      shell: powershell
      run: |
        kubectl config use-context minikube
        kubectl config current-context
        kubectl get nodes
        
    - name: Submit Argo Workflow
      shell: powershell
      run: |
        Write-Host "=== Submitting Argo Workflow to Minikube ==="
        
        $workflowFile = ".github/workflows/netflix-ml-pipeline-fixed_phase10.yml"
        
        if (-not (Test-Path $workflowFile)) {
          Write-Error "Workflow file not found: $workflowFile"
          exit 1
        }
        
        Write-Host "Using workflow: $workflowFile"
        
        kubectl create -f $workflowFile -n argo
        
        Start-Sleep -Seconds 3
        
        $workflowName = kubectl get workflows -n argo --sort-by='.metadata.creationTimestamp' -o jsonpath='{.items[-1].metadata.name}'
        
        Write-Host "✅ Workflow submitted: $workflowName"
        echo "WORKFLOW_NAME=$workflowName" >> $env:GITHUB_ENV
        
        kubectl get workflow $workflowName -n argo

    - name: Monitor Workflow
      shell: powershell
      timeout-minutes: 30
      run: |
        $workflowName = $env:WORKFLOW_NAME
        Write-Host "Monitoring: $workflowName"
        
        $timeout = 1800
        $startTime = Get-Date
        
        while ($true) {
          $elapsed = ([DateTime]::Now - $startTime).TotalSeconds
          
          if ($elapsed -gt $timeout) {
            Write-Error "Timeout after 30 minutes"
            exit 1
          }
          
          $status = kubectl get workflow $workflowName -n argo -o jsonpath='{.status.phase}' 2>$null
          if (-not $status) { $status = "Pending" }
          
          Write-Host "Status: $status (${elapsed}s)"
          
          switch ($status) {
            "Succeeded" { 
              Write-Host "✅ Workflow completed!"
              return
            }
            "Failed" { 
              Write-Host "❌ Workflow failed!"
              kubectl logs -n argo -l workflows.argoproj.io/workflow=$workflowName --tail=50
              exit 1 
            }
            "Error" { 
              Write-Host "❌ Workflow error!"
              kubectl logs -n argo -l workflows.argoproj.io/workflow=$workflowName --tail=50
              exit 1 
            }
            default { Start-Sleep -Seconds 15 }
          }
        }

    - name: Get Workflow Logs
      shell: powershell
      if: always()
      run: |
        $workflowName = $env:WORKFLOW_NAME
        Write-Host "=== Final Workflow Status ==="
        kubectl get workflow $workflowName -n argo -o wide
        
        Write-Host "=== Workflow Logs ==="
        kubectl logs -n argo -l workflows.argoproj.io/workflow=$workflowName --tail=100
        
        Write-Host "=== MLflow Access Info ==="
        Write-Host "Port-forward: kubectl port-forward -n argo svc/mlflow-service 5000:5000"
        Write-Host "URL: http://localhost:5000"
