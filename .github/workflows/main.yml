name: Main CI/CD Pipeline  # Name of the GitHub Actions workflow
#test
#  Events that trigger the workflow
=======
name: Main CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/netflix-api

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: |
        pip install flake8 black
        black --check src/ tests/ || true
        flake8 src/ tests/ --max-line-length=88 || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: |
        pip install -r requirements.txt
        pytest tests/

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ github.sha }}

  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - run: pip install pyyaml
    - run: python scripts/ci/validate_k8s_manifests.py

  trigger-argo:
    name: Trigger Argo on Minikube
    runs-on: self-hosted
    needs: [build-and-push, validate-k8s]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup kubectl context
      shell: pwsh
      run: |
        kubectl config use-context minikube
        kubectl config current-context
        kubectl get nodes
        
    - name: Submit Argo Workflow
      shell: bash
      run: |
        echo "=== Submitting Argo Workflow to Minikube ==="
        
        WORKFLOW_FILE=".github/workflows/netflix-ml-pipeline-fixed_phase10.yml"
        
        if [ ! -f "$WORKFLOW_FILE" ]; then
          echo "ERROR: Workflow file not found: $WORKFLOW_FILE"
          exit 1
        fi
        
        echo "Using workflow: $WORKFLOW_FILE"
        
        kubectl create -f "$WORKFLOW_FILE" -n argo
        
        sleep 3
        
        WORKFLOW_NAME=$(kubectl get workflows -n argo --sort-by='.metadata.creationTimestamp' -o jsonpath='{.items[-1].metadata.name}')
        
        echo "✅ Workflow submitted: $WORKFLOW_NAME"
        echo "WORKFLOW_NAME=$WORKFLOW_NAME" >> $GITHUB_ENV
        
        kubectl get workflow "$WORKFLOW_NAME" -n argo

    - name: Monitor Workflow
      shell: bash
      timeout-minutes: 30
      run: |
        WORKFLOW_NAME="${{ env.WORKFLOW_NAME }}"
        echo "Monitoring: $WORKFLOW_NAME"
        
        timeout=1800
        start_time=$(date +%s)
        
        while true; do
          current_time=$(date +%s)
          elapsed=$((current_time - start_time))
          
          if [ $elapsed -gt $timeout ]; then
            echo "Timeout after 30 minutes"
            exit 1
          fi
          
          STATUS=$(kubectl get workflow "$WORKFLOW_NAME" -n argo -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
          echo "Status: $STATUS (${elapsed}s)"
          
          case "$STATUS" in
            "Succeeded")
              echo "✅ Workflow completed!"
              break
              ;;
            "Failed"|"Error")
              echo "❌ Workflow failed!"
              kubectl logs -n argo -l workflows.argoproj.io/workflow="$WORKFLOW_NAME" --tail=50 || true
              exit 1
              ;;
            "Running"|"Pending")
              sleep 15
              ;;
            *)
              sleep 5
              ;;
          esac
        done

    - name: Get Workflow Logs
      shell: bash
      if: always()
      run: |
        WORKFLOW_NAME="${{ env.WORKFLOW_NAME }}"
        echo "=== Final Workflow Status ==="
        kubectl get workflow "$WORKFLOW_NAME" -n argo -o wide || true
        
        echo "=== Workflow Logs ==="
        kubectl logs -n argo -l workflows.argoproj.io/workflow="$WORKFLOW_NAME" --tail=100 || true
        
        echo "=== MLflow Access Info ==="
        echo "Port-forward: kubectl port-forward -n argo svc/mlflow-service 5000:5000"
        echo "URL: http://localhost:5000"
